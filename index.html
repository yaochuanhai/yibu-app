<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>一步 · 每次只做一件事</title>
<script>
  window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
</script>
<script defer src="/_vercel/insights/script.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=DM+Mono:wght@400;500&display=swap');

  :root {
    --ink: #1a1a1a;
    --paper: #f5f0e8;
    --paper2: #ede8dc;
    --accent: #c8502a;
    --accent-light: #f0c4b0;
    --muted: #8a7f72;
    --step-bg: #fff9f0;
    --border: #d4cbbf;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Serif SC', serif;
    background: var(--paper);
    color: var(--ink);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* grain overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 100;
  }

  header {
    width: 100%;
    max-width: 640px;
    padding: 48px 32px 0;
    display: flex;
    justify-content: space-between;
    align-items: baseline;
  }

  .logo {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 0.05em;
    color: var(--ink);
  }

  .logo span {
    color: var(--accent);
  }

  .tagline {
    font-size: 12px;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.08em;
  }

  main {
    width: 100%;
    max-width: 640px;
    padding: 40px 32px 80px;
    flex: 1;
  }

  /* Input screen */
  .screen { display: none; }
  .screen.active { display: block; }

  .input-label {
    font-size: 13px;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 16px;
  }

  .task-input-wrap {
    position: relative;
    margin-bottom: 8px;
  }

  textarea {
    width: 100%;
    background: var(--step-bg);
    border: 1.5px solid var(--border);
    border-radius: 4px;
    padding: 20px;
    font-family: 'Noto Serif SC', serif;
    font-size: 17px;
    line-height: 1.7;
    color: var(--ink);
    resize: none;
    min-height: 140px;
    transition: border-color 0.2s;
    outline: none;
  }

  textarea:focus {
    border-color: var(--accent);
  }

  textarea::placeholder {
    color: var(--border);
  }

  .hint {
    font-size: 12px;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    margin-bottom: 28px;
    padding-left: 4px;
  }

  .btn-primary {
    background: var(--ink);
    color: var(--paper);
    border: none;
    padding: 16px 36px;
    font-family: 'Noto Serif SC', serif;
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 0.05em;
    cursor: pointer;
    border-radius: 3px;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 10px;
    width: 100%;
    justify-content: center;
  }

  .btn-primary:hover {
    background: var(--accent);
    transform: translateY(-1px);
    box-shadow: 0 4px 16px rgba(200,80,42,0.25);
  }

  .btn-primary:disabled {
    opacity: 0.4;
    cursor: not-allowed;
    transform: none;
    box-shadow: none;
    background: var(--ink);
  }

  .loading-dots {
    display: inline-flex;
    gap: 4px;
    align-items: center;
  }

  .loading-dots span {
    width: 5px;
    height: 5px;
    background: var(--paper);
    border-radius: 50%;
    animation: dot 1.2s ease-in-out infinite;
  }

  .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
  .loading-dots span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes dot {
    0%, 80%, 100% { opacity: 0.2; transform: scale(0.8); }
    40% { opacity: 1; transform: scale(1); }
  }

  /* Steps screen */
  .task-title {
    font-size: 13px;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  .task-name {
    font-size: 20px;
    font-weight: 600;
    color: var(--ink);
    line-height: 1.5;
    margin-bottom: 36px;
    padding-bottom: 24px;
    border-bottom: 1px solid var(--border);
  }

  .progress-bar-wrap {
    margin-bottom: 32px;
  }

  .progress-info {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
  }

  .progress-text {
    font-size: 12px;
    font-family: 'DM Mono', monospace;
    color: var(--muted);
    letter-spacing: 0.08em;
  }

  .progress-bar {
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    transition: width 0.5s ease;
  }

  /* Current step card */
  .current-step-card {
    background: var(--step-bg);
    border: 1.5px solid var(--border);
    border-left: 4px solid var(--accent);
    border-radius: 4px;
    padding: 28px 24px;
    margin-bottom: 20px;
    animation: slideIn 0.35s ease;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .step-number {
    font-size: 11px;
    font-family: 'DM Mono', monospace;
    color: var(--accent);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  .step-content {
    font-size: 19px;
    line-height: 1.75;
    color: var(--ink);
    font-weight: 400;
  }

  .step-time {
    margin-top: 16px;
    font-size: 12px;
    font-family: 'DM Mono', monospace;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 6px;
  }

  /* Next steps preview */
  .upcoming-label {
    font-size: 11px;
    font-family: 'DM Mono', monospace;
    color: var(--muted);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 12px;
    margin-top: 28px;
  }

  .upcoming-steps {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-bottom: 32px;
  }

  .upcoming-step {
    padding: 12px 16px;
    background: var(--paper2);
    border-radius: 3px;
    font-size: 14px;
    color: var(--muted);
    display: flex;
    align-items: flex-start;
    gap: 10px;
    opacity: 0.7;
  }

  .upcoming-step .num {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    min-width: 20px;
    padding-top: 2px;
    color: var(--border);
  }

  /* Done button */
  .btn-done {
    background: var(--accent);
    color: white;
    border: none;
    padding: 18px 36px;
    font-family: 'Noto Serif SC', serif;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    border-radius: 3px;
    transition: all 0.15s;
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    letter-spacing: 0.03em;
  }

  .btn-done:hover {
    background: #a84025;
    transform: translateY(-1px);
    box-shadow: 0 6px 20px rgba(200,80,42,0.35);
  }

  .btn-restart {
    margin-top: 12px;
    background: transparent;
    border: 1.5px solid var(--border);
    color: var(--muted);
    padding: 12px;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.08em;
    cursor: pointer;
    border-radius: 3px;
    width: 100%;
    transition: all 0.15s;
  }

  .btn-restart:hover {
    border-color: var(--ink);
    color: var(--ink);
  }

  /* Complete screen */
  .complete-wrap {
    text-align: center;
    padding: 48px 0;
    animation: fadeIn 0.5s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  .complete-icon {
    font-size: 56px;
    margin-bottom: 24px;
  }

  .complete-title {
    font-size: 26px;
    font-weight: 700;
    margin-bottom: 12px;
    color: var(--ink);
  }

  .complete-sub {
    font-size: 15px;
    color: var(--muted);
    margin-bottom: 40px;
    line-height: 1.7;
  }

  .complete-task {
    background: var(--paper2);
    border-radius: 4px;
    padding: 16px 20px;
    font-size: 14px;
    color: var(--muted);
    margin-bottom: 36px;
    text-align: left;
    border-left: 3px solid var(--accent);
  }

  .complete-task strong {
    display: block;
    font-size: 12px;
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 6px;
  }

  /* Error */
  .error-msg {
    background: #fff0ed;
    border: 1px solid #f0c4b0;
    border-radius: 4px;
    padding: 14px 16px;
    font-size: 13px;
    color: var(--accent);
    margin-top: 12px;
    font-family: 'DM Mono', monospace;
    display: none;
  }

  /* Completed steps */
  .completed-steps {
    display: flex;
    flex-direction: column;
    gap: 6px;
    margin-bottom: 12px;
  }

  .completed-step {
    padding: 10px 14px;
    background: transparent;
    border-radius: 3px;
    font-size: 13px;
    color: var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
    text-decoration: line-through;
  }

  .completed-step .check {
    color: var(--accent);
    font-size: 14px;
    text-decoration: none;
    display: inline-block;
  }

</style>
</head>
<body>

<header>
  <div class="logo">一<span>步</span></div>
  <div class="tagline">每次只做一件事</div>
</header>

<main>

  <!-- Screen 1: Input -->
  <div class="screen active" id="screen-input">
    <div class="input-label">你现在想做什么？</div>
    <div class="task-input-wrap">
      <textarea id="task-input" placeholder="写论文第三章的引言部分&#10;整理三个月的账单&#10;准备明天的产品演示..." rows="4"></textarea>
    </div>
    <div class="hint">→ 不用想太多，把那件一直拖着的事写出来</div>
    <button class="btn-primary" id="btn-start" onclick="startTask()">
      <span id="btn-text">帮我拆解，开始做</span>
    </button>
    <div class="error-msg" id="error-msg"></div>
  </div>

  <!-- Screen 2: Steps -->
  <div class="screen" id="screen-steps">
    <div class="task-title">你的任务</div>
    <div class="task-name" id="display-task"></div>

    <div class="progress-bar-wrap">
      <div class="progress-info">
        <span class="progress-text" id="progress-text">第 1 步 / 共 5 步</span>
        <span class="progress-text" id="progress-pct">0%</span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" id="progress-fill" style="width:0%"></div>
      </div>
    </div>

    <div class="completed-steps" id="completed-steps"></div>

    <div class="current-step-card" id="current-step-card">
      <div class="step-number" id="step-number">第 1 步</div>
      <div class="step-content" id="step-content"></div>
      <div class="step-time" id="step-time">⏱ 预计 5 分钟</div>
    </div>

    <div class="upcoming-label" id="upcoming-label">接下来</div>
    <div class="upcoming-steps" id="upcoming-steps"></div>

    <button class="btn-done" onclick="nextStep()">
      ✓ &nbsp;完成这一步，继续
    </button>
    <button class="btn-restart" onclick="restart()">重新开始 / 换个任务</button>
  </div>

  <!-- Screen 3: Complete -->
  <div class="screen" id="screen-complete">
    <div class="complete-wrap">
      <div class="complete-icon">🎯</div>
      <div class="complete-title">完成了</div>
      <div class="complete-sub">你做到了。<br>一步一步，把它做完了。</div>
      <div class="complete-task">
        <strong>已完成的任务</strong>
        <span id="complete-task-name"></span>
      </div>
      <button class="btn-primary" onclick="restart()">开始下一个任务</button>
    </div>
  </div>

</main>

<script>
let steps = [];
let currentStepIndex = 0;
let currentTask = '';

async function startTask() {
  const input = document.getElementById('task-input').value.trim();
  if (!input) return;

  currentTask = input;
  const btn = document.getElementById('btn-start');
  const btnText = document.getElementById('btn-text');
  const errEl = document.getElementById('error-msg');

  btn.disabled = true;
  btnText.innerHTML = `<span class="loading-dots"><span></span><span></span><span></span></span> AI 拆解中...`;
  errEl.style.display = 'none';

  try {
    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 1000,
        system: `你是一个专治拖延症的任务拆解教练。用户会告诉你一个让他拖延的任务，你需要把它拆解成3到6个具体、可执行的小步骤。

规则：
1. 每个步骤必须具体到"现在就能开始做"，不能模糊
2. 第一步必须是最简单的、5分钟内能完成的热身动作，降低启动阻力
3. 步骤不要太多，最多6步，保持专注感
4. 语气平静、直接，不说废话，不鼓励
5. 每步给一个预估时间（分钟）

严格按照以下JSON格式输出，不要输出任何其他内容：
{
  "steps": [
    {"content": "步骤描述", "minutes": 5},
    {"content": "步骤描述", "minutes": 15}
  ]
}`,
        messages: [{ role: "user", content: `我要做：${input}` }]
      })
    });

    const data = await response.json();
    const text = data.content.map(i => i.text || '').join('');
    const clean = text.replace(/```json|```/g, '').trim();
    const parsed = JSON.parse(clean);

    steps = parsed.steps;
    currentStepIndex = 0;
    showStepsScreen();

  } catch (err) {
    errEl.textContent = '拆解失败，请重试';
    errEl.style.display = 'block';
  } finally {
    btn.disabled = false;
    btnText.textContent = '帮我拆解，开始做';
  }
}

function showStepsScreen() {
  document.getElementById('screen-input').classList.remove('active');
  document.getElementById('screen-steps').classList.add('active');
  document.getElementById('display-task').textContent = currentTask;
  renderStep();
}

function renderStep() {
  const total = steps.length;
  const idx = currentStepIndex;
  const step = steps[idx];

  // progress
  const pct = Math.round((idx / total) * 100);
  document.getElementById('progress-text').textContent = `第 ${idx + 1} 步 / 共 ${total} 步`;
  document.getElementById('progress-pct').textContent = `${pct}%`;
  document.getElementById('progress-fill').style.width = pct + '%';

  // current step
  document.getElementById('step-number').textContent = `第 ${idx + 1} 步`;
  document.getElementById('step-content').textContent = step.content;
  document.getElementById('step-time').textContent = `⏱ 预计 ${step.minutes} 分钟`;

  // re-animate card
  const card = document.getElementById('current-step-card');
  card.style.animation = 'none';
  card.offsetHeight;
  card.style.animation = 'slideIn 0.35s ease';

  // completed steps
  const completedEl = document.getElementById('completed-steps');
  completedEl.innerHTML = '';
  for (let i = 0; i < idx; i++) {
    const div = document.createElement('div');
    div.className = 'completed-step';
    div.innerHTML = `<span class="check">✓</span>${steps[i].content}`;
    completedEl.appendChild(div);
  }

  // upcoming steps
  const upcomingEl = document.getElementById('upcoming-steps');
  const upcomingLabel = document.getElementById('upcoming-label');
  const remaining = steps.slice(idx + 1);

  if (remaining.length === 0) {
    upcomingEl.style.display = 'none';
    upcomingLabel.style.display = 'none';
  } else {
    upcomingEl.style.display = 'flex';
    upcomingLabel.style.display = 'block';
    upcomingEl.innerHTML = '';
    remaining.forEach((s, i) => {
      const div = document.createElement('div');
      div.className = 'upcoming-step';
      div.innerHTML = `<span class="num">${idx + i + 2}</span>${s.content}`;
      upcomingEl.appendChild(div);
    });
  }
}

function nextStep() {
  currentStepIndex++;
  if (currentStepIndex >= steps.length) {
    showComplete();
  } else {
    renderStep();
  }
}

function showComplete() {
  document.getElementById('screen-steps').classList.remove('active');
  document.getElementById('screen-complete').classList.add('active');
  document.getElementById('complete-task-name').textContent = currentTask;
}

function restart() {
  document.getElementById('screen-steps').classList.remove('active');
  document.getElementById('screen-complete').classList.remove('active');
  document.getElementById('screen-input').classList.add('active');
  document.getElementById('task-input').value = '';
  steps = [];
  currentStepIndex = 0;
  currentTask = '';
}

// Enter key to submit
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('task-input').addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && (e.metaKey || e.ctrlKey)) {
      startTask();
    }
  });
});
</script>

</body>
</html>
